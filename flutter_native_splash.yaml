# Splash natif (instantané) — affiché avant que Flutter ne démarre.
# Génère les ressources via : dart run flutter_native_splash:create
#
# Stratégie : matcher EXACTEMENT le SplashPage Dart custom (gradient bleu EBI
# avec logo blanc centré). Sur Android 12+, le système impose son propre splash
# (windowSplashScreen) — on ne peut pas le supprimer, mais en lui donnant la
# même couleur de fond que le SplashPage Dart, la transition devient invisible :
# l'utilisateur ne voit qu'un seul splash continu.
flutter_native_splash:
  # Fond bleu primaire EBI (= EbiColors.blue), identique à celui du SplashPage.
  color: "#0E91C5"
  color_dark: "#0E91C5"

  # PAS de logo ni de branding ici : le logo est dessiné par le SplashPage
  # Dart (avec animation fade+scale). Garder le splash natif sans logo évite
  # le clignotement d'un logo statique qui apparaît puis disparaît.

  # Android 12+ : même fond bleu, sans icône.
  android_12:
    color: "#0E91C5"
    color_dark: "#0E91C5"
    icon_background_color: "#0E91C5"
    icon_background_color_dark: "#0E91C5"

  android: true
  ios: true
  web: false

  fullscreen: false
  android_gravity: center
  ios_content_mode: center
